strategy_version = "phase1-initial"

[strategy]
main_count = 5
momentum_days = 60
sma_short_days = 50
sma_long_days = 200
rsi_days = 14
rsi_threshold = 50
macd_fast_days = 12
macd_slow_days = 26
macd_signal_days = 9
tie_break_liquidity_days = 20
main_target_weight = 0.88
general_symbol_weight_cap = 0.25
high_volatility_total_cap = 0.10
high_volatility_symbol_cap = 0.05
high_volatility_max_symbols = 2
cash_buffer_weight = 0.02
minimum_price_days = 201
maximum_recent_missing_days = 0
# 선정 유지 버퍼(hysteresis, §3.3). 0=비활성(단순 상위 N). >0이면 보유 종목을
# 상위 (main_count+값) 이내 유지. 최적값은 grade-B 후 확정(현재 비활성).
selection_hysteresis = 0

[strategy.factor_weights]
momentum = 0.40
trend = 0.25
rsi = 0.15
macd = 0.20

[risk]
stop_loss_fraction = 0.10
daily_loss_limit_fraction = 0.03
regime_vix_threshold = 30
regime_wti_return_days = 20
regime_wti_return_threshold = 0.30
regime_exit_confirmation_days = 3
# 레짐 해제용 VIX 비대칭 임계. 진입 임계와 동일(30)하면 기존 동작과 bit-identical.
# 낮추면(예: 25) [값, 진입임계] 구간이 hysteresis 밴드가 되어 그라인딩 베어의 재진입 whipsaw를 줄인다.
# 파라미터 최적값은 grade-B 데이터 확보 후 확정(docs/reviews/2026-07-23-regime-overlay-effectiveness.md).
regime_exit_vix_threshold = 30
experimental_equity_cap = 0.50

[validation]
minimum_backtest_years = 10
holdout_years = 2
walk_forward_train_years = 5
walk_forward_validation_years = 1
transaction_cost_bps = [5, 15, 30]

[sentiment]
candidate_limit = 20
minimum_observation_sessions = 60
forward_return_horizons = [1, 5, 20]

[execution]
limit_offset_fraction = 0.003
default_tick_size = 0.01
order_timeout_seconds = 600
estimated_fee_bps = 15
# 재조정 밴드(no-trade band, §3.5). 0=비활성. >0이면 보유·선정 유지 종목의 비중
# 드리프트가 이 값 이내면 재조정 주문 생략(리스크 축소는 예외). 값은 grade-B 후 확정.
rebalance_band = 0
